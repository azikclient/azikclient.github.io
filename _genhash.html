<!DOCTYPE html><html><body><script>
async function h(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
(async()=>{
  const e=await h('negrkarlo@gmail.com');
  const p=await h('azimjonuzbek');
  document.body.innerHTML='<pre>EMAIL_HASH: '+e+'<br>PASS_HASH: '+p+'</pre>';
  console.log('EMAIL_HASH:',e);
  console.log('PASS_HASH:',p);
})();
</script></body></html>
